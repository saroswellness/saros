<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Thank You - Saro's Wellness</title>

    <!-- ✅ GOOGLE FONTS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #eef0e7;
        color: #264d36;

        display: flex;
        justify-content: center;
        align-items: center;

        min-height: 100vh;
        text-align: center;
      }

      .thankyou-container {
        max-width: 700px;
        padding: 40px;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 72px;
        color: #143d2a;
        margin-bottom: 20px;
      }

      p {
        font-size: 18px;
        line-height: 1.8;
        color: #315742;
        margin-bottom: 35px;
      }

      .home-btn {
        display: inline-block;
        padding: 14px 32px;

        background: #143d2a;
        color: white;

        text-decoration: none;
        border-radius: 10px;

        transition: 0.3s ease;
        font-size: 16px;
      }

      .home-btn:hover {
        background: #1e563d;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 48px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <div class="thankyou-container">
      <h1>Thank You!</h1>

      <p>
        Your message has been successfully sent to Saro's Wellness. We truly
        appreciate you reaching out and we'll get back to you soon.
      </p>

      <a href="index.html" class="home-btn"> Back to Home </a>
    </div>
  </body>
</html>
